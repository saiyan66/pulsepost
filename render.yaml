services:
  - type: web
    name: pulsepost-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsepost-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulsepost-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: pulsepost-db
    databaseName: pulsepost
    user: pulsepost

  - name: pulsepost-redis
    type: redis