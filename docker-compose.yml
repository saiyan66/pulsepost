version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pulsepost_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pulsepost
    ports:
      - "5432:5432"      
    volumes:
      - postgres_data:/var/lib/postgresql/data   

  redis:
    image: redis:7-alpine
    container_name: pulsepost_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: